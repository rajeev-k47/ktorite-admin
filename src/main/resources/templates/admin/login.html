<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
  <meta charset="utf-8">
  <title>Login — Ktorite Admin</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #eff1f5;
      color: #4c4f69;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
    }

    form {
      width: 320px;
    }

    form label {
      display: block;
      margin: 0.5rem 0 0.25rem;
      font-weight: 600;
    }

    form input {
      width: 100%;
      padding: 0.4rem;
      border: 1px solid #bcc0cc;
      border-radius: 4px;
      box-sizing: border-box;
    }

    .btn {
      display: inline-block;
      padding: 0.3rem 0.7rem;
      border-radius: 4px;
      text-decoration: none;
      font-size: 0.875rem;
    }

    .btn-primary {
      background: #1e66f5;
      color: #fff;
    }
  </style>
</head>

<body>
  <form method="post" th:action="${loginPath}">
    <h1>Ktorite Admin</h1>
    <label>Username</label><input type="text" name="username" required>
    <label>Password</label><input type="password" name="password" required>
    <div style="margin-top:1rem"><button type="submit" class="btn btn-primary">Login</button></div>
  </form>
</body>

</html>
